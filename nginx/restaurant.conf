limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN www.DOMAIN;
    return 301 https://DOMAIN$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN www.DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    root /var/www/restaurant/frontend/dist;
    index index.html;
    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_types application/json text/css application/javascript text/javascript image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── SSE streaming endpoints ────────────────────────────────────────────────
    # These hold connections open for minutes/hours.
    # Must be matched BEFORE the general /api/ block.
    # proxy_buffering off: nginx must not buffer SSE — events would be held until
    #                      buffer fills, destroying real-time delivery.
    # X-Accel-Buffering no: tells nginx's own accel proxy not to buffer either.
    # proxy_read_timeout 3600s: 1 hour — covers a full kitchen shift.
    # No limit_req here — SSE clients reconnect automatically, rate limiting
    # would cause infinite reconnect loops.
    location ~ ^/api/(orders/.*/stream|kitchen/stream|menu/stream|chat)$ {
        proxy_pass         http://unix:/run/restaurant/gunicorn.sock:;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
        proxy_cache        off;
        add_header         Cache-Control no-cache;
        add_header         X-Accel-Buffering no;
    }

    # ── General API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://unix:/run/restaurant/gunicorn.sock:;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        limit_req          zone=api burst=20 nodelay;
    }

    location /uploads/ {
        alias /var/www/restaurant/backend/uploads/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
