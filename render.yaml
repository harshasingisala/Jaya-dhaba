services:
  - type: web
    name: jaya-dhaba
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.config.py "app:create_app()"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
