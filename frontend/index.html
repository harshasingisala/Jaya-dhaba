<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>Jaya Dhaba</title>
    
    <!-- Search and social fallbacks before React renders -->
    <meta name="description" content="Jaya Dhaba - Heritage Restored. Flavor Perfected. Authentic Indian restaurant in East Marredpally, Secunderabad." />
    <meta name="keywords" content="Jaya Dhaba, Indian restaurant, East Marredpally, Secunderabad restaurants, Telangana, Indian cuisine" />
    <meta property="og:title" content="Jaya Dhaba - Heritage Restored. Flavor Perfected." />
    <meta property="og:description" content="Authentic Indian restaurant in East Marredpally, Secunderabad." />
    <meta property="og:image" content="https://www.jayadhaba.online/og-image.jpg" />
    <meta property="og:url" content="https://www.jayadhaba.online/" />
    <meta property="og:type" content="restaurant" />
    <meta property="og:site_name" content="Jaya Dhaba" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <!-- Preconnects & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    
    <!-- Custom Favicon Manifest -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2D241E" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["Restaurant", "LocalBusiness"],
        "name": "Jaya Dhaba",
        "description": "Heritage Restored. Flavor Perfected. Authentic Indian restaurant in East Marredpally, Secunderabad since 2020.",
        "url": "https://www.jayadhaba.online/",
        "telephone": "+917386185821",
        "foundingDate": "2020",
        "priceRange": "INR 100-1000",
        "servesCuisine": ["Indian", "North Indian", "South Indian"],
        "currenciesAccepted": "INR",
        "paymentAccepted": "Cash, Credit Card, UPI",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "East Marredpally",
          "addressLocality": "Secunderabad",
          "addressRegion": "Telangana",
          "postalCode": "500026",
          "addressCountry": "IN"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 17.4399,
          "longitude": 78.5011
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
            "opens": "11:00",
            "closes": "23:00"
          }
        ],
        "menu": "https://www.jayadhaba.online/menu",
        "acceptsReservations": true
      }
    </script>

    <!-- SRI not available for Razorpay - vendor hosted checkout script. -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
